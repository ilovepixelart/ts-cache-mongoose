name: PR check

on:
  workflow_dispatch:
  # Trigger on push to main or pull requests
  push:
    branches:
      - main
      - feature*

  pull_request:
    types: [opened, synchronize, reopened]

# Declare default permissions as read only. No job in this workflow writes to
# the repo — tests, biome, type-check, coverage, and SonarCloud all run in
# read-only mode. SonarCloud PR decorations come from the SonarCloud GitHub
# App, not GITHUB_TOKEN write scopes.
permissions:
  contents: read

jobs:
  tests:
    name: Coverage
    runs-on: ubuntu-latest
    permissions:
      contents: read

    # Service containers to run with `container-job`
    services:
      # Label used to access the service container
      redis:
        # Docker Hub image
        image: redis
        # Set health checks to wait until redis has started
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          # Maps port 6379 on service container to the host
          - 6379:6379

    strategy:
      matrix:
        node-version: [20.x, 22.x]
        mongoose-version:
          [
            [mongoose@6.12.2, bson@^4.7.2],
            [mongoose@7.6.4, bson@^5.5.0],
            [mongoose@8.23.0, bson@^6.10.4],
            [mongoose@9.4.1, bson@^7.0.0],
          ]
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # Disabling shallow clone is recommended for improving relevancy of reporting
          fetch-depth: 0
          persist-credentials: false

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Installing dependencies
        run: npm ci

      - name: Installing ${{ matrix.mongoose-version[0] }} ${{ matrix.mongoose-version[1] }}
        run: npm i ${{ matrix.mongoose-version[0] }} ${{ matrix.mongoose-version[1] }}

      - name: Type check
        run: npm run type:check

      - name: Coverage
        run: npm run test
        env:
          # The hostname used to communicate with the Redis service container
          REDIS_HOST: localhost
          # The default Redis port
          REDIS_PORT: 6379

  sonar:
    name: Biome, Coverage & Sonar
    runs-on: ubuntu-latest
    permissions:
      contents: read

    # Service containers to run with `container-job`
    services:
      # Label used to access the service container
      redis:
        # Docker Hub image
        image: redis
        # Set health checks to wait until redis has started
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          # Maps port 6379 on service container to the host
          - 6379:6379

    strategy:
      matrix:
        node-version: [24.x]
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # Disabling shallow clone is recommended for improving relevancy of reporting
          fetch-depth: 0
          persist-credentials: false

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Installing dependencies
        run: npm ci

      - name: Verify provenance signatures
        run: npm audit signatures

      - name: Biome
        run: npm run biome

      - name: Type check tests
        run: npm run type:check:tests

      - name: Coverage
        run: npm run test
        env:
          # The hostname used to communicate with the Redis service container
          REDIS_HOST: localhost
          # The default Redis port
          REDIS_PORT: 6379

      - name: Scan
        if: env.SONAR_TOKEN
        uses: SonarSource/sonarqube-scan-action@299e4b793aaa83bf2aba7c9c14bedbb485688ec4 # v7.1.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.organization=ilovepixelart
            -Dsonar.projectName=ts-cache-mongoose
            -Dsonar.projectKey=ilovepixelart_ts-cache-mongoose
            -Dsonar.javascript.lcov.reportPaths=coverage/lcov.info
            -Dsonar.sources=src
            -Dsonar.tests=tests
            -Dsonar.test.exclusions=tests/**
            -Dsonar.coverage.exclusions=tests/**
